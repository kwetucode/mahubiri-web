name: 🚀 Deploy via SSH Mahubiri backend

on:
  push:
    branches:
      - main # Déclenche le workflow sur chaque push sur la branche main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout code
        uses: actions/checkout@v4
        # Récupère le code source du dépôt

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
        # Installe PHP 8.2 sur l'environnement GitHub Actions

      - name: � Install dependencies
        run: composer install --no-dev --optimize-autoloader
        # Installe les dépendances PHP sans les dépendances de développement

      - name: 🧪 Validate remote deploy path
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
              echo "DEPLOY_PATH secret is empty"
              exit 1
            fi
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            test -d "${{ secrets.DEPLOY_PATH }}"
            test -w "${{ secrets.DEPLOY_PATH }}"

      - name: 🚀 Deploy to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "./"
          target: "${{ secrets.DEPLOY_PATH }}/"
          rm: false
          overwrite: true
          strip_components: 0
        # Transfère tous les fichiers du projet vers le serveur distant via SCP

      - name: 🔧 Run artisan commands remotely
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                cp .env.example .env
                echo "Created .env from .env.example"
              else
                echo ".env is missing and .env.example not found"
                exit 1
              fi
            fi

            if ! grep -q '^APP_KEY=base64:' .env; then
              php artisan key:generate --force --no-interaction
            fi

            php artisan migrate --force --no-interaction
            php artisan db:seed --force --no-interaction
            CACHE_STORE=file php artisan optimize:clear --no-interaction || true
            php artisan config:cache --no-interaction
            php artisan route:cache --no-interaction
            php artisan view:cache --no-interaction
        # Exécute des commandes Laravel sur le serveur distant (migrations, cache, etc.)

      - name: 📄 Copy index.php, .htaccess and robots.txt to root
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            [ -f ${{ secrets.DEPLOY_PATH }}/index.php ] || cp ${{ secrets.DEPLOY_PATH }}/public/index.php ${{ secrets.DEPLOY_PATH }}/index.php
            [ -f ${{ secrets.DEPLOY_PATH }}/robots.txt ] || cp ${{ secrets.DEPLOY_PATH }}/public/robots.txt ${{ secrets.DEPLOY_PATH }}/robots.txt
            [ -f ${{ secrets.DEPLOY_PATH }}/.htaccess ] || cp ${{ secrets.DEPLOY_PATH }}/public/.htaccess ${{ secrets.DEPLOY_PATH }}/.htaccess
        # Copie certains fichiers du dossier public à la racine si besoin
