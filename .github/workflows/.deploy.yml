name: 🚀 Deploy Mahubir api

on:
  push:
    branches:
      - main # ou master selon ta branche par défaut

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, xml, ctype, json, curl, openssl, tokenizer, pdo, pdo_mysql
          coverage: none

      - name: 🧰 Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: ⚡ Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: 📦 Create deployment package
        run: zip -r deploy.zip . -x ".git/*" "vendor/*" ".github/*"

      - name: 📤 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/tests/**
            storage/framework/cache/data/**
            storage/logs/**

      - name: 🧹 Cleanup cache
        run: rm deploy.zip
