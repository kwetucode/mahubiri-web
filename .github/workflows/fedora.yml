name: Fedora SSH Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy to Fedora server via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.FEDORA_SSH_HOST }}
          username: ${{ secrets.FEDORA_SSH_USERNAME }}
          key: ${{ secrets.FEDORA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.FEDORA_SSH_PORT }}
          source: "./"
          target: ${{ secrets.FEDORA_DEPLOY_PATH }}
          rm: false
          overwrite: true
          strip_components: 0
      - name: Run artisan commands remotely
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.FEDORA_SSH_HOST }}
          username: ${{ secrets.FEDORA_SSH_USERNAME }}
          key: ${{ secrets.FEDORA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.FEDORA_SSH_PORT }}
          script: |
            cd ${{ secrets.FEDORA_DEPLOY_PATH }}
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize:clear
      - name: Copy index.php, .htaccess and robots.txt to root
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.FEDORA_SSH_HOST }}
          username: ${{ secrets.FEDORA_SSH_USERNAME }}
          key: ${{ secrets.FEDORA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.FEDORA_SSH_PORT }}
          script: |
            cp ${{ secrets.FEDORA_DEPLOY_PATH }}/public/index.php ${{ secrets.FEDORA_DEPLOY_PATH }}/index.php
            cp ${{ secrets.FEDORA_DEPLOY_PATH }}/public/robots.txt ${{ secrets.FEDORA_DEPLOY_PATH }}/robots.txt
            cp ${{ secrets.FEDORA_DEPLOY_PATH }}/public/.htaccess ${{ secrets.FEDORA_DEPLOY_PATH }}/.htaccess || true
