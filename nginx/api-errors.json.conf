# ─────────────────────────────────────────────────────────────────────
# Nginx JSON error pages for the API
# ─────────────────────────────────────────────────────────────────────
# Include this file inside the `server` block that handles mahubiri.tech:
#
#   server {
#       server_name mahubiri.tech;
#       include /path/to/mahubiri-back/nginx/api-errors.json.conf;
#       ...
#   }
#
# This ensures Nginx-level errors (405, 502, etc.) return JSON instead
# of HTML, so the Flutter client never crashes on FormatException.
# ─────────────────────────────────────────────────────────────────────

# JSON error response bodies
error_page 400 @json_400;
error_page 401 @json_401;
error_page 403 @json_403;
error_page 404 @json_404;
error_page 405 @json_405;
error_page 408 @json_408;
error_page 413 @json_413;
error_page 429 @json_429;
error_page 500 @json_500;
error_page 502 @json_502;
error_page 503 @json_503;
error_page 504 @json_504;

location @json_400 {
    default_type application/json;
    return 400 '{"success":false,"message":"Requête invalide.","error":{"code":"BAD_REQUEST","status":400,"origin":"nginx","retry":false}}';
}

location @json_401 {
    default_type application/json;
    return 401 '{"success":false,"message":"Authentification requise.","error":{"code":"UNAUTHORIZED","status":401,"origin":"nginx","retry":false}}';
}

location @json_403 {
    default_type application/json;
    return 403 '{"success":false,"message":"Accès refusé par le serveur.","error":{"code":"ACCESS_DENIED","status":403,"origin":"nginx","retry":true}}';
}

location @json_404 {
    default_type application/json;
    return 404 '{"success":false,"message":"La ressource demandée est introuvable.","error":{"code":"NOT_FOUND","status":404,"origin":"nginx","retry":false}}';
}

location @json_405 {
    default_type application/json;
    return 405 '{"success":false,"message":"Méthode non autorisée.","error":{"code":"METHOD_NOT_ALLOWED","status":405,"origin":"nginx","retry":false}}';
}

location @json_408 {
    default_type application/json;
    return 408 '{"success":false,"message":"Délai de la requête dépassé.","error":{"code":"REQUEST_TIMEOUT","status":408,"origin":"nginx","retry":true}}';
}

location @json_413 {
    default_type application/json;
    return 413 '{"success":false,"message":"Le fichier envoyé est trop volumineux.","error":{"code":"PAYLOAD_TOO_LARGE","status":413,"origin":"nginx","retry":false}}';
}

location @json_429 {
    default_type application/json;
    return 429 '{"success":false,"message":"Trop de requêtes. Veuillez patienter.","error":{"code":"RATE_LIMITED","status":429,"origin":"nginx","retry":true}}';
}

location @json_500 {
    default_type application/json;
    return 500 '{"success":false,"message":"Erreur interne du serveur.","error":{"code":"SERVER_ERROR","status":500,"origin":"nginx","retry":true}}';
}

location @json_502 {
    default_type application/json;
    return 502 '{"success":false,"message":"Le serveur est temporairement indisponible.","error":{"code":"BAD_GATEWAY","status":502,"origin":"nginx","retry":true}}';
}

location @json_503 {
    default_type application/json;
    return 503 '{"success":false,"message":"Service en maintenance.","error":{"code":"SERVICE_UNAVAILABLE","status":503,"origin":"nginx","retry":true}}';
}

location @json_504 {
    default_type application/json;
    return 504 '{"success":false,"message":"Le serveur a mis trop de temps à répondre.","error":{"code":"GATEWAY_TIMEOUT","status":504,"origin":"nginx","retry":true}}';
}
