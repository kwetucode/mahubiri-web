# ─────────────────────────────────────────────────────────────────────
# Nginx configuration for mahubiri.tech
# ─────────────────────────────────────────────────────────────────────
# Copy to /etc/nginx/sites-available/mahubiri.tech
# Adapt paths, SSL certs, and PHP-FPM socket as needed.
#
# Key points:
#   1. ALL API routes (/api/) go through PHP-FPM → Laravel
#   2. Nginx error pages return JSON (via api-errors.json.conf)
#   3. Static storage files served directly by Nginx
# ─────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name mahubiri.tech www.mahubiri.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mahubiri.tech www.mahubiri.tech;

    # ── SSL (adapt paths) ──────────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/mahubiri.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mahubiri.tech/privkey.pem;

    # ── Root & index ───────────────────────────────────────────────
    root /var/www/mahubiri-back/public;
    index index.php;

    # ── Logs ───────────────────────────────────────────────────────
    access_log /var/log/nginx/mahubiri-access.log;
    error_log  /var/log/nginx/mahubiri-error.log;

    # ── Upload limit (sermons audio files) ─────────────────────────
    client_max_body_size 100M;

    # ── JSON error pages for all Nginx-level errors ────────────────
    include /var/www/mahubiri-back/nginx/api-errors.json.conf;

    # ── API routes: ALWAYS pass to Laravel (never treat as static) ─
    # This block MUST come BEFORE the static file locations.
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Admin panel (Inertia) ──────────────────────────────────────
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Static storage files (audio, images, etc.) ─────────────────
    location /storage/ {
        # Serve directly, with cache headers for audio/images
        add_header Access-Control-Allow-Origin "*" always;
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # ── Build assets (Vite) ────────────────────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── PHP-FPM ────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout for long audio uploads
        fastcgi_read_timeout 300;
    }

    # ── Default: pass everything else to Laravel ───────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Deny hidden files (.env, .git, etc.) ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
